<!DOCTYPE html>
<html lang="ru">
<head>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;

        iframe {
            display: block;
            width: 100%;
            height: 100%;

    <script>
        vkBridge.send('VKWebAppInit');
        vkBridge.send('VKWebAppLoadingCompleted', { ok: true });
        vkBridge.send('VKWebAppSetSwipeSettings', { history: true });
    </script>
